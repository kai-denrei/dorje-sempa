<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — The Path</title>
  <meta name="description" content="You are offline and this page has not been saved for offline reading.">
  <meta name="theme-color" content="#7a3a31">
  <link rel="apple-touch-icon" href="/dorje-sempa/icons/apple-touch-icon-180.png?v=0c73872a">
  <!-- Fully self-contained: inline CSS only, no external assets, so it renders
       with no network. Colors mirror styles/tokens.css (parchment / maroon). -->
  <style>
    :root {
      --paper: #f6f2e9;
      --paper-sink: #ece5d6;
      --ink: #383128;
      --ink-soft: #6b6253;
      --maroon: #7a3a31;
      --gold: #e6b94f;
      --rule: #d9cfba;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --paper: #1f1b16;
        --paper-sink: #28231d;
        --ink: #ece6da;
        --ink-soft: #b6ad9d;
        --maroon: #d07c6e;
        --gold: #ecc066;
        --rule: #3a342b;
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Iowan Old Style', Georgia, 'Times New Roman', serif;
      line-height: 1.6;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    main {
      max-width: 34rem;
      text-align: center;
    }
    .bead {
      width: 64px; height: 64px;
      margin: 0 auto 1.75rem;
      border-radius: 999px;
      background: var(--maroon);
      display: grid;
      place-items: center;
    }
    .bead span {
      width: 22px; height: 22px;
      border-radius: 999px;
      background: var(--gold);
    }
    .eyebrow {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--maroon);
      margin: 0 0 0.5rem;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      line-height: 1.15;
      margin: 0 0 0.75rem;
    }
    p { color: var(--ink-soft); margin: 0 0 1rem; }
    .home {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.6rem 1.4rem;
      border: 1px solid var(--maroon);
      border-radius: 6px;
      background: var(--maroon);
      color: var(--paper);
      text-decoration: none;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.95rem;
    }
    .home:hover, .home:focus-visible { background: transparent; color: var(--maroon); }
    .retry {
      display: inline-block;
      margin-top: 0.5rem;
      margin-left: 0.5rem;
      padding: 0.6rem 1.4rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: transparent;
      color: var(--ink-soft);
      text-decoration: none;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
    }
    hr { border: 0; border-top: 1px solid var(--rule); margin: 2rem auto 0; max-width: 12rem; }
    .note { font-size: 0.82rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <main>
    <div class="bead" aria-hidden="true"><span></span></div>
    <p class="eyebrow">The Path</p>
    <h1>You are offline</h1>
    <p>This page has not yet been saved for offline reading. Pages you have already visited — the homepage, the glossary — remain available while you are disconnected.</p>
    <p>
      <a class="home" href="/dorje-sempa/">Return to the homepage</a>
      <a class="retry" href="javascript:location.reload()">Try again</a>
    </p>
    <hr>
    <p class="note">When your connection returns, everything reloads as normal.</p>
  </main>
</body>
</html>
